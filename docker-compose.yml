services:
  app:
    build: .
    ports:
      - "${INKIT_BIND:-0.0.0.0}:${INKIT_PORT:-4000}:4000"
    environment:
      PHX_SERVER: "true"
      PHX_HOST: "${PHX_HOST:-localhost}"
      PHX_SCHEME: "${PHX_SCHEME:-http}"
      PHX_URL_PORT: "${PHX_URL_PORT:-4000}"
      PORT: "4000"
      DATABASE_PATH: "/data/inkit.db"
      UPLOAD_DIR: "/data/uploads"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?set with: openssl rand -base64 48}"
    volumes:
      - inkit_data:/data

volumes:
  inkit_data:
